<!DOCTYPE html>
<html>
<head>
<title>Book Service | Agriaasan</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<h2>Agriaasan</h2>
</nav>

<section class="page">
<h1>Book Drone Spraying</h1>

<form id="bookingForm">

<input type="text" id="name" placeholder="Farmer Name" required>
<input type="text" id="state" placeholder="State" required>
<input type="text" id="village" placeholder="Village" required>
<input type="text" id="crop" placeholder="Crop Type" required>
<input type="number" id="land" placeholder="Land Size (acres)" required>

<button type="submit">Submit Booking</button>

</form>

</section>

<script src="script.js"></script>

</body>
</html>
